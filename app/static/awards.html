<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyteam Awards</title>
  <link rel="stylesheet" href="/static/public.css" />
</head>
<body class="module-page awards-page">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">Flyteam</a>
      <nav class="nav">
          <a href="/">&#x9996;&#x9875;</a>
          <a href="/news">&#x56e2;&#x961f;&#x65b0;&#x95fb;</a>
          <a href="/review">&#x56e2;&#x961f;&#x56de;&#x987e;</a>
          <a href="/awards">&#x5956;&#x9879;&#x8363;&#x8a89;</a>
          <a href="/flyteamers">Flyteamers</a>
          <a href="/recruit">&#x62db;&#x65b0;&#x62a5;&#x540d;</a>
          <a href="/intro">&#x56e2;&#x961f;&#x7b80;&#x4ecb;</a>
        </nav>
    </div>
  </header>

  <main class="section light page-main">
    <div class="container">
      <div class="page-title-bar">
        <p class="sub page-sub">Flyteam</p>
        <h2>&#x5956;&#x9879;&#x8363;&#x8a89;</h2>
        <p class="section-sub">按团队赛与个人赛分类查看 Flyteam 的竞赛荣誉与项目成果。</p>
      </div>
      <div id="awardTypeSwitch" class="award-switch" role="tablist" aria-label="奖项分类筛选">
        <button class="award-switch-card active" type="button" data-award-type="team" role="tab" aria-selected="true">
          <span class="award-switch-kicker">Team Competition</span>
          <strong>团队赛</strong>
          <small>多人协作、代表团队出战的竞赛荣誉</small>
          <em class="award-switch-count">0 项</em>
        </button>
        <button class="award-switch-card" type="button" data-award-type="personal" role="tab" aria-selected="false">
          <span class="award-switch-kicker">Individual Competition</span>
          <strong>个人赛</strong>
          <small>成员个人能力与单项赛事成果展示</small>
          <em class="award-switch-count">0 项</em>
        </button>
      </div>
      <p id="awardTypeHint" class="award-type-hint"></p>
      <div id="awardGrid" class="award-grid"></div>
    </div>
  </main>

  <button id="chatFab" class="chat-fab" aria-label="open chat">&#x54a8;</button>
  <aside id="chatPanel" class="chat-panel">
    <div class="chat-head">
      <strong>&#x56e2;&#x961f;&#x4fe1;&#x606f;&#x54a8;&#x8be2;</strong>
      <button id="chatClose" type="button">&#x5173;&#x95ed;</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input">
      <textarea id="chatText" rows="3" placeholder="例如：Flyteam对于新生的培养方式是什么？"></textarea>
      <button id="chatSend" type="button">&#x53d1;&#x9001;</button>
    </div>
  </aside>
  <div id="imgLightbox" class="img-lightbox" aria-hidden="true">
    <figure>
      <img id="imgLightboxImage" alt="preview" />
      <figcaption id="imgLightboxCaption">&#x56fe;&#x7247;&#x9884;&#x89c8;</figcaption>
      <div class="lightbox-actions">
        <button id="imgLightboxClose" type="button">&#x5173;&#x95ed;</button>
      </div>
    </figure>
  </div>

  <script src="/static/page_backdrop.js"></script>
  <script src="/static/public.js"></script>
</body>
</html>
