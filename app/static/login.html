<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyteam 管理员登录</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Flyteam 管理员登录</h1>
    <p>访问后台前请先登录。登录成功后会自动进入管理后台。</p>
    <form id="loginForm">
      <input id="username" autocomplete="username" placeholder="管理员账号" required />
      <input id="password" type="password" autocomplete="current-password" placeholder="管理员密码" required />
      <div class="login-row">
        <a class="back-link" href="/">返回首页</a>
        <button type="submit">登录后台</button>
      </div>
    </form>
    <div id="loginMsg" class="login-msg"></div>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
